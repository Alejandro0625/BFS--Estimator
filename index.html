<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo-bfs.png" />
    <title>BFS AI Estimator — Boston Facade Systems</title>
    <meta name="description" content="AI-powered panel siding takeoff. Upload a blueprint, get accurate square-footage by material and a bid-ready estimate in minutes." />
    <meta name="theme-color" content="#0C1B2E" />
    <meta property="og:title" content="BFS AI Estimator" />
    <meta property="og:description" content="AI panel-siding takeoff and estimating for facade contractors." />
    <meta property="og:type" content="website" />
    <style>
      html,body{margin:0;padding:0;background:#0C1B2E;}
      #root{min-height:100vh;}
      /* Branded pre-load splash (replaced once React mounts) */
      #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#0C1B2E;font-family:'Inter','Segoe UI',-apple-system,sans-serif;}
      #boot img{height:46px;opacity:.95}
      #boot .b{font-size:.62rem;letter-spacing:.2em;color:rgba(255,255,255,.35);text-transform:uppercase;font-weight:600}
      #boot .r{width:120px;height:3px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
      #boot .r::after{content:"";display:block;height:100%;width:40%;border-radius:3px;background:#4A86C8;animation:slide 1.1s ease-in-out infinite}
      @keyframes slide{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <img src="/logo-bfs.png" alt="Boston Facade Systems" />
        <div class="b">AI Panel Estimator</div>
        <div class="r"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
